services:
  backend:
    build:
      context: ./minseok
      dockerfile: Dockerfile
    ports:
      - "8100:8000"  # redoceanmap이 메인(8000) — ragwatson은 8100
    volumes:
      - ./minseok:/app
    env_file:
      - .env  # GEMINI_API_KEY 등 비밀값 (environment가 같은 키보다 우선)
    environment:
      - ENV=development
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-raguser}:${POSTGRES_PASSWORD:-please_change}@pgvector:5432/${POSTGRES_DB:-ragdb}
      - OLLAMA_HOST=http://host.docker.internal:11434
      - N8N_WEBHOOK_URL=http://host.docker.internal:5678/webhook/sherlock-email
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./www
      dockerfile: Dockerfile
    ports:
      - "3100:3000"
    volumes:
      - ./www:/app
      - /app/.next
      - /app/node_modules
    command: npm run dev
    environment:
      - NODE_ENV=development

  # n8n은 redoceanmap(메인) 스택이 소유 — 같은 n8n_data 볼륨을 쓰므로 여기서 띄우지 않는다.
  # (동시 기동 시 SQLite 잠금 충돌. 필요하면 com.redoceanmap에서 docker compose up -d n8n)

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  pgvector:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"  # 정식 5432는 redoceanmap pgvector
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-raguser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-please_change}
      - POSTGRES_DB=${POSTGRES_DB:-ragdb}

  neo4j:
    image: neo4j:5
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/please_change}

volumes:
  redis_data:
  pgvector_data:
  neo4j_data:
